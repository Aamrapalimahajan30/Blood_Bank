{% extends 'donors/base.html' %}
{% block title %}Hospital Login{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-5">
    <div class="card p-4">
      <h4 class="mb-3 text-center"><i class="fa-solid fa-right-to-bracket"></i> Hospital Login</h4>
      <form method="post">
        {% csrf_token %}
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <input type="text" name="username" class="form-control" required autofocus>
        </div>
        <div class="mb-3">
          <label class="form-label fw-semibold">Password</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-bb w-100"><i class="fa-solid fa-right-to-bracket"></i> Login</button>
      </form>
      <p class="text-center mt-3 mb-0">No account yet? <a href="{% url 'signup' %}">Create one</a></p>
    </div>
  </div>
</div>
{% endblock %}
